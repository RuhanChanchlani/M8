<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manager Login | RapidResponse</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>body{margin:0;font-family:"Manrope",sans-serif;background:#f3ede4;color:#1d1b16;} .glass-card{background:rgba(255,255,255,0.15);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.1);} .button-primary{background:#91472a;color:#fff;} input{background:rgba(255,255,255,0.7)!important;border:1.5px solid rgba(145,71,42,0.2)!important;transition:all 0.3s;} input:focus{background:rgba(255,255,255,0.95)!important;border-color:#91472a!important;box-shadow:0 0 0 3px rgba(145,71,42,0.1);}
.full-page-bg {
    background-image: url(https://lh3.googleusercontent.com/aida/ADBb0uhOQK3zEhxAOul0A6KyMPRnH-0dpzJ5vQiHu20ntS1-MIxATrExL3wtw38O6siXDd7zVuKXv3hn2fwldh_J6je3gT6jTeAGQGWXQjUpT0W-3UBdaj49bXg06JghnOouiW7fN67M3NIwtBaseWrKFFJRbdkYrbiPK9ro1EWo070_WA_saN6_Cg5b7OjS0GWMDkPJ0N8WpyX62nJsWvyXBKgVm7QUZZoXLLlu2fCdCqmRRNSdFsck0C6zjzpzE9hdm0si5IP_RGUhuP0);
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
    min-height: 100vh
}
.liquid-glass {
    background: linear-gradient(135deg, rgba(145, 71, 42, 0.9) 0%, rgba(175, 94, 63, 0.9) 100%);
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.6), 0 10px 20px rgba(145, 71, 42, 0.3), inset 0 -2px 4px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.4)
}
.liquid-glass::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 50%, rgba(255, 255, 255, 0.1) 100%);
    pointer-events: none
}
.heavy-glass {
    background: rgba(255, 248, 239, 0.65);
    backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 32px 0 rgba(29, 27, 22, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.3)
}
</style>
</head>
<body class="full-page-bg text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md">
<div class="glass-card rounded-[2.5rem] overflow-hidden px-10 py-12">
<!-- Header Section -->
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#91472a]/10 mb-4">
<span class="material-symbols-outlined text-3xl text-[#91472a]">admin_panel_settings</span>
</div>
<h1 class="text-4xl font-extrabold text-[#91472a] mb-2">Manager Portal</h1>
<p class="text-sm text-[#54433d] leading-relaxed">Access the command center to manage incidents and assign staff.</p>
</div>
<hr class="my-6 border-[#d9d2c6]" />
<!-- Account Selector -->
<div class="mb-8 p-4 bg-gradient-to-r from-[#91472a]/5 to-[#765700]/5 rounded-2xl border border-[#d9d2c6]">
<p class="text-xs uppercase tracking-[0.3em] text-[#765700] font-bold mb-3">Quick Role Select</p>
<div class="grid grid-cols-3 gap-2">
<button type="button" onclick="window.location.assign('guest_login.html')" class="px-3 py-2.5 rounded-xl heavy-glass text-[#765700] text-[11px] font-bold uppercase tracking-[0.1em] transition hover:bg-white/80 border border-[#d9d2c6] active:scale-95">
Guest
</button>
<button type="button" onclick="window.location.assign('staff_login.html')" class="px-3 py-2.5 rounded-xl heavy-glass text-[#765700] text-[11px] font-bold uppercase tracking-[0.1em] transition hover:bg-white/80 border border-[#d9d2c6] active:scale-95">
Staff
</button>
<button type="button" onclick="document.getElementById('login-form').username.value='manager'; document.getElementById('login-form').password.value='manager123';" class="px-3 py-2.5 rounded-xl liquid-glass text-white text-[11px] font-bold uppercase tracking-[0.1em] transition hover:bg-[#7a3e21] shadow-md hover:shadow-lg active:scale-95">
Manager
</button>
</div>
</div>
<!-- Form -->
<form id="login-form" class="space-y-4" onsubmit="event.preventDefault(); loginRole('manager')">
<div>
<label class="block text-xs uppercase tracking-[0.3em] text-[#765700] font-bold mb-2">Manager ID</label>
<input name="username" type="text" autocomplete="username" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="Enter manager ID" />
</div>
<div>
<label class="block text-xs uppercase tracking-[0.3em] text-[#765700] font-bold mb-2">Password</label>
<input name="password" type="password" autocomplete="current-password" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="••••••••" />
</div>
<div id="login-error" class="text-sm text-red-600 font-medium min-h-[1.5rem]"></div>
<button type="submit" class="w-full rounded-xl py-3 liquid-glass text-white font-bold uppercase tracking-[0.15em] text-sm hover:bg-[#7a3e21] transition shadow-lg hover:shadow-xl active:scale-95">
Access Manager Portal
</button>
</form>
<!-- Footer Info -->
<div class="mt-8 pt-6 border-t border-[#d9d2c6]">
<p class="text-xs text-[#54433d] leading-relaxed mb-3">
<strong>Demo:</strong> Click the brown Manager button above to auto-fill credentials.
</p>
<p class="text-xs text-[#54433d]">
Need guest or staff access? <a href="home.html" class="text-[#91472a] font-bold hover:underline">Return Home</a>
</p>
</div>
</div>
</div>
<script src="auth.js"></script>
</body>
</html>
